trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  terraformVersion: '1.7.5'
  azureServiceConnection: 'Azure-Service-Connection-Name'

stages:

# =====================================================
# Stage 1 - Validate (Runs on PR + Main)
# =====================================================
- stage: Validate
  displayName: "Terraform Validate & Lint"

  jobs:
  - job: Validate_All
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - script: |
        cd terraform-agents
        terraform init -backend=false
        terraform fmt -check
        terraform validate
      displayName: "Validate Agents"

    - script: |
        cd terraform-database
        terraform init -backend=false
        terraform fmt -check
        terraform validate
      displayName: "Validate Database"


# =====================================================
# Stage 2 - Plan (Dev)
# =====================================================
- stage: Plan_Dev
  displayName: "Terraform Plan - Dev"
  dependsOn: Validate

  jobs:
  - job: Plan_Dev
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: AzureCLI@2
      displayName: "Plan Agents - Dev"
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform-agents
          terraform init
          terraform plan -out=tfplan-agents

    - publish: terraform-agents/tfplan-agents
      artifact: agents-plan

    - task: AzureCLI@2
      displayName: "Plan Database - Dev"
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform-database
          terraform init
          terraform plan -out=tfplan-db

    - publish: terraform-database/tfplan-db
      artifact: db-plan


# =====================================================
# Stage 3 - Apply Dev
# =====================================================
- stage: Apply_Dev
  displayName: "Apply - Dev"
  dependsOn: Plan_Dev

  jobs:
  - deployment: DeployDev
    environment: Dev
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: agents-plan

          - download: current
            artifact: db-plan

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AzureCLI@2
            displayName: "Apply Agents - Dev"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd terraform-agents
                terraform init
                terraform apply -auto-approve tfplan-agents

          - task: AzureCLI@2
            displayName: "Apply Database - Dev"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd terraform-database
                terraform init
                terraform apply -auto-approve tfplan-db


# =====================================================
# Stage 4 - Apply Production (Manual Approval)
# =====================================================
- stage: Apply_Prod
  displayName: "Apply - Production"
  dependsOn: Apply_Dev

  jobs:
  - deployment: DeployProd
    environment: Production   # <-- Configure approval in Azure DevOps UI
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AzureCLI@2
            displayName: "Apply Agents - Prod"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd terraform-agents
                terraform init
                terraform apply -auto-approve

          - task: AzureCLI@2
            displayName: "Apply Database - Prod"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd terraform-database
                terraform init
                terraform apply -auto-approve